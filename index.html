    <!-- Disable tap highlight on mobile -->
    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Prevenir zoom en inputs en iOS */
      input[type="text"],
      input[type="number"],
      input[type="email"],
      input[type="tel"],
      input[type="password"],
      select,
      textarea {
        font-size: 16px;
      }

      /* Loading spinner inicial */
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        z-index: 9999;
      }

      #app-loading.hide {
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
      }

      .spinner-container {
        position: relative;
        width: 80px;
        height: 80px;
        margin: 0 auto;
      }

      .spinner {
        position: absolute;
        inset: 0;
        width: 80px;
        height: 80px;
        border: 5px solid rgba(255, 255, 255, 0.2);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }

      .spinner-inner {
        position: absolute;
        inset: 8px;
        width: 64px;
        height: 64px;
        border: 4px solid rgba(255, 255, 255, 0.15);
        border-bottom-color: rgba(255, 255, 255, 0.8);
        border-radius: 50%;
        animation: spin-reverse 1.2s linear infinite;
      }

      .spinner-glow {
        position: absolute;
        inset: -10px;
        background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, transparent 70%);
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @keyframes spin-reverse {
        to { transform: rotate(-360deg); }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.15); opacity: 1; }
      }

      .loading-text {
        color: white;
        margin-top: 24px;
        font-family: 'Inter', sans-serif;
        font-size: 18px;
        font-weight: 600;
        text-align: center;
        text-shadow: 0 2px 10px rgba(0,0,0,0.2);
      }
    </style>
  </head>
  <body>
    <!-- Loading inicial -->
    <div id="app-loading">
      <div style="text-align: center;">
        <div class="spinner-container">
          <div class="spinner-glow"></div>
          <div class="spinner"></div>
          <div class="spinner-inner"></div>
        </div>
        <p class="loading-text">Cargando Sistema POS...</p>
      </div>
    </div>

    <!-- App root -->
    <div id="root"></div>

    <!-- Service Worker Registration -->
    <script>
      // Ocultar loading cuando la app esté lista
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loading = document.getElementById('app-loading');
          if (loading) {
            loading.classList.add('hide');
            setTimeout(() => loading.remove(), 300);
          }
        }, 500);
      });

      // Prevenir zoom con pellizco en iOS
      document.addEventListener('gesturestart', function(e) {
        e.preventDefault();
      });

      // Prevenir zoom con doble tap en iOS
      let lastTouchEnd = 0;
      document.addEventListener('touchend', function(e) {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) {
          e.preventDefault();
        }
        lastTouchEnd = now;
      }, false);
    </script>

    <!-- Main app script -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- No JavaScript fallback -->
    <noscript>

        position: fixed;

        justify-content: center;

        padding: 20px;
        text-align: center;
      ">

            JavaScript Requerido
          </h1>
          <p style="color: #718096; font-size: 16px;">
            Esta aplicación requiere JavaScript para funcionar.<br>
            Por favor, habilita JavaScript en tu navegador.
          </p>
        </div>
      </div>
    </noscript>
  </body>
